name: Second Workflow
on: push

jobs:
  run-first-command:
    runs-on: ubuntu-latest
    steps:
      - name: Display Some text
        run: echo "Hello, World!"
      - name: Display multiple lines of text
        run: |
          echo "Hello, World!"
          echo "This is a multi-line message."
          echo "Goodbye, World!"
          echo "date is $(date)"
  run-second-command:
    runs-on: ubuntu-latest
    steps:
      - name: Display numbers
        run: |
          for i in {1..5}
          do
            echo "Number: $i"
          done
