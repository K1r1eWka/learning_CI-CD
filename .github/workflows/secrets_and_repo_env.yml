name: Secrets Workflow
# run-name: This is 7th Workflow
on: push
jobs:
  my_job:
    runs-on: ubuntu-latest
    steps:
      - name: show variables
        run: |
          echo '${{ vars.STATUS}}'
          echo '${{ secrets.PASSWORD}}'
  my_second_job:
    runs-on: ubuntu-latest
    needs: my_job
    environment:
      name: prodaction
    steps:
      - name: show variables
        run: |
          echo '${{ vars.PROD_STATUS}}'
          echo '${{ secrets.PROD_PASSWORD}}'
  my_third_job:
    runs-on: ubuntu-latest
    needs: my_second_job
    environment:
      name: staging
    steps:
      - name: show variables
        run: |
          echo '${{ vars.STAGING_STATUS}}'
          echo '${{ secrets.STAGING_PASSWORD}}'
