name: First Workflow
on: workflow_dispatch

jobs:
  run-first-command:
    runs-on: ubuntu-latest
    steps:
      - name: Display Some text
        run: echo "Hello, World!"
      - name: Display multiple lines of text
        run: |
          echo "Hello, World!"
          echo "This is a multi-line message."
          echo "Goodbye, World!"
          echo "date is $(date)"
