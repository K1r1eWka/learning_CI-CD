name: Statuses Workflow
on: push

jobs:
  # failure(), success(), always(), canceled()
  my_job:
    runs-on: ubuntu-latest
    steps:
      - name: First step
        run: sleep 10
      - name: Failure step
        id: error-step
        run: exit 1

      - name: Runs on any case
        if: ${{ always() }}
        run: echo "Job runs always"
      - name: Runs on Success
        if: ${{ success() }}
        run: echo "Job was successful"
      - name: Runs on Failure
        if: ${{ failure() && steps.error-step.conclusion == 'failure' }}
        run: echo "Job failed"


  second_job:
    runs-on: ubuntu-latest
    needs: my_job
    if: ${{ failure() }}
    steps:
      - run: echo "This job runs only if the first job fails"